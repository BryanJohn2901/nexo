<div id="cookie-banner" role="dialog" aria-live="polite" aria-label="Aviso de cookies">
  <div class="flex items-start gap-3 mb-4">
    <div class="w-10 h-10 rounded-xl bg-brand-primary/10 border border-brand-primary/30 flex items-center justify-center flex-shrink-0">
      <i class="fas fa-cookie-bite text-brand-primary"></i>
    </div>
    <p class="text-sm text-brand-textSecondary leading-relaxed">
      <span data-i18n="cookies.msg">Usamos cookies para melhorar sua experiência, medir desempenho e personalizar conteúdo, em conformidade com a LGPD. Ao continuar navegando, você concorda com nossa</span>
      <a href="/politica-de-cookies/" class="text-brand-primary font-semibold hover:underline" data-i18n="cookies.link">Política de Cookies</a>.
    </p>
  </div>
  <div class="flex flex-wrap gap-3">
    <button type="button" onclick="acceptCookies()"
      class="split-btn inline-flex items-center rounded-full bg-brand-primary px-5 py-2.5 text-xs font-bold text-brand-bg hover:bg-brand-primaryHover transition" data-i18n="cookies.accept">
      Aceitar todos
    </button>
    <button type="button" onclick="rejectCookies()"
      class="inline-flex items-center rounded-full border border-brand-border/25 px-5 py-2.5 text-xs font-semibold text-brand-textSecondary hover:border-brand-primary/50 hover:text-brand-primary transition" data-i18n="cookies.reject">
      Somente essenciais
    </button>
  </div>
</div>
